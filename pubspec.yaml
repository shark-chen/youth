name: youth
description: "A new Flutter project."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
# The following defines the version and build number for your application.
# The following defines flutter pub cache repaires the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+00

environment:
  sdk: ">=2.17.1 <=3.11.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  geocoding: ^3.0.0
  # 预览PDF，安装APK的库
  open_file:
    git:
      url: https://github.com/shark-chen/open_file.git
      ref: a832727080d7e8b0919a38191541ee0bc4174c9a
  # 文件存储
  path: 1.9.0
  path_provider: 2.1.2
  # http库
  dio: 5.6.0
  url_launcher: 6.2.5
  # cookie管理
  cookie_jar: 3.0.1
  # loading转圈圈
  flutter_easyloading: 3.0.5
  dio_cookie_manager: 2.1.0
  # 加密
  encrypt: 5.0.3
  # 设备信息
  package_info_plus: 4.2.0
  # getX
  get: 4.6.6
  # web
  webview_flutter: 4.8.0
  # 语音播报
  just_audio: 0.9.37
  # 应用权限
  permission_handler: ^11.3.1
  # 图片加载组件，并支持缓存
  cached_network_image: 3.3.1
  # webView的cookie管理
  webview_cookie_manager:
    git:
      url: https://github.com/fryette/webview_cookie_manager.git
  # 设备信息获取
  device_info_plus: 10.1.0
  # 跳转手机设置库
  app_settings: 6.1.1
  # 点击手机键盘库
  flutter_keyboard_visibility: 6.0.0
  # 下拉刷新组件
  pull_to_refresh: 2.0.0
  # http_proxy: 1.2.2
  # 自动字大小Text库
  auto_size_text: 3.0.0
  # 网络缓存，现在还没使用上，现在是自己实现的
  dio_cache_interceptor: 3.4.2
  # 文本滚动-如流水灯库
  text_scroll: 0.2.0
  # jason转模型库
  convert: 3.1.1
  # 值通知
  event_bus: 2.0.0
  # 网络监控库
  connectivity_plus: 6.1.5
  # 忘了是干啥的啦
  extended_image: 8.2.0
  # cell 侧滑删除库
  flutter_swipe_action_cell: 3.1.3
  # 本地缓存库
  hive: 2.2.3
  shared_preferences: 2.1.2
  # 相册选择库
  image_picker: 1.1.2
  # 照片保存到相册库
  # image_gallery_saver: 2.0.3
  image_gallery_saver:
    git:
      url: https://github.com/shark-chen/image_gallery_saver.git
      ref: master
  # 图片压缩库
  flutter_image_compress: 2.3.0
  # 代码分析库
  dart_code_metrics: 4.19.2
  # 下拉刷新库
  easy_refresh: 3.4.0
  extended_nested_scroll_view: 6.2.1
  # 生成二维码库
  qr_flutter: 4.1.0
  # 检测手机是否触发截图
  # screenshot_callback: 3.0.1
  screenshot_callback:
    git:
      url: https://github.com/shark-chen/flutter_screenshot_callback.git
      ref: master
  # 展开收起文本
  readmore: 3.0.0
  # 语音播报
  audioplayers: 6.0.0
  # flutter_spinkit 本项目为使用此库，只是有三方库有使用，这里是为了帮他们统一版本
  flutter_spinkit: 5.1.0
  # decimal计算
  decimal: 2.3.3
  # 数据监控
  rxdart: 0.27.7
  # 设备唯一码，卸载安装也是唯一的
#  flutter_udid: 4.0.0
#  flutter_chat_core: 0.0.2
#  flutter_chat_ui: 1.6.15
  chat_bubbles: 1.5.0
  font_awesome_flutter: 10.4.0
  image: 4.8.0
  # 定位（经纬度）与反地理编码（省/市/区）
  geolocator: 12.0.0
dev_dependencies:
#  flutter_test:
#    sdk: flutter

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/image/
    - assets/image/common/
    - assets/
    - assets/data/
flutter_intl:
  enabled: false
